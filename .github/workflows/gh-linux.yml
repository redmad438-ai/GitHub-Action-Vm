name: GitHub Hosted Runner SSH Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Update package list
        if: always()
        continue-on-error: true
        run: |
          sudo apt-get update

      - name: Install SSH and dependencies
        if: always()
        continue-on-error: true
        run: |
          sudo apt-get install -y openssh-server sshpass tmux

      - name: Set root password
        if: always()
        continue-on-error: true
        run: |
          echo "root:root" | sudo chpasswd

      - name: Allow root login via SSH
        if: always()
        continue-on-error: true
        run: |
          sudo sed -i.bak -E 's/^#?PermitRootLogin\s+.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo service ssh restart || true

      - name: Start SSH service
        if: always()
        continue-on-error: true
        run: |
          sudo service ssh start || true

      - name: Create root home directory and data folder with permissions
        if: always()
        continue-on-error: true
        run: |
          sudo mkdir -p /root
          sudo chown root:root /root
          sudo chmod 755 /root
          sudo mkdir -p /root/data
          sudo chown root:root /root/data
          sudo chmod 777 /root/data

      - name: Restore /root/data cache
        if: always()
        continue-on-error: true
        uses: actions/cache@v3
        id: cache-restore
        with:
          path: /root/data
          key: ${{ runner.os }}-data-${{ hashFiles('**/lockfile') }}
          restore-keys: |
            ${{ runner.os }}-data-

      - name: Setup SSH tunnel with localhost.run
        if: always()
        continue-on-error: true
        run: |
          # Use localhost.run instead of serveo
          sshpass -p 'root' ssh -o StrictHostKeyChecking=no \
            -R 80:localhost:22 \
            localhost.run -v &
          sleep 5
          echo "Tunnel established at: http://localhost.run"

      - name: Keep workflow alive
        if: always()
        continue-on-error: true
        timeout-minutes: 350
        run: |
          while true; do
            sleep 300
          done

      - name: Save /root/data cache
        if: always()
        continue-on-error: true
        uses: actions/cache@v3
        with:
          path: /root/data
          key: ${{ runner.os }}-data-${{ hashFiles('**/lockfile') }}
